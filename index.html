<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Providencia - Violencia Familiar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        #previsualizacion {
            white-space: pre-wrap;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            line-height: 1.5;
            color: #000;
            text-align: justify;
        }
        
        /* Estilos para botones de micrófono */
        .mic-button {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }
        
        .mic-button:hover {
            background: #e5e7eb;
            border-color: #9ca3af;
        }
        
        .mic-button.recording {
            background: #dc2626;
            border-color: #dc2626;
            animation: pulse 1.5s infinite;
        }
        
        .mic-button.recording svg {
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(220, 38, 38, 0);
            }
        }
        
        .field-with-mic {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .field-with-mic input {
            flex: 1;
        }
        
        /* Inputs de nombres en mayúsculas */
        #nombreDenunciante,
        #nombreDenunciado,
        #nombresHijos {
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-7xl mx-auto">
        <!-- Encabezado -->
        <div class="bg-gradient-to-br from-slate-800 via-slate-700 to-slate-900 rounded-t-sm px-8 py-8 border-b-2 border-blue-400">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-bold text-white uppercase tracking-wide">Generador de Providencia</h1>
                    <p class="text-sm text-gray-300 mt-2">Violencia Familiar - Medidas Cautelares</p>
                </div>
                <button id="activateVoiceBtn" onclick="activarDictadoVoz()" 
                    class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-sm flex items-center gap-2 transition-all transform hover:scale-105 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" x2="12" y1="19" y2="22"/>
                    </svg>
                    <span>Activar Dictado por Voz</span>
                </button>
            </div>
        </div>

        <!-- Grid de 2 columnas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Panel Formulario -->
            <div class="bg-white rounded-b-sm lg:rounded-sm shadow-md border border-gray-200 p-6 space-y-6">
                
                <!-- Datos de la Denuncia -->
                <div class="border-l-2 border-blue-300 pl-6">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-4">Datos de la Denuncia</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Fecha de Denuncia <span class="text-red-600">*</span>
                            </label>
                            <input type="date" id="fechaDenuncia" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Número de Preventivo
                            </label>
                            <input type="text" id="numeroPreventivo" placeholder="Ej: 168/2025"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Denunciante (Apellido y Nombre) <span class="text-red-600">*</span>
                            </label>
                            <div class="field-with-mic">
                                <input type="text" id="nombreDenunciante" placeholder="Ej: PÉREZ MARÍA"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                                <button type="button" class="mic-button" onclick="startVoiceRecognition('nombreDenunciante')" title="Dictar con micrófono">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                        <line x1="12" x2="12" y1="19" y2="22"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Denunciado (Apellido y Nombre) <span class="text-red-600">*</span>
                            </label>
                            <div class="field-with-mic">
                                <input type="text" id="nombreDenunciado" placeholder="Ej: GARCÍA JUAN"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                                <button type="button" class="mic-button" onclick="startVoiceRecognition('nombreDenunciado')" title="Dictar con micrófono">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                        <line x1="12" x2="12" y1="19" y2="22"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Domicilio de la Denunciante <span class="text-red-600">*</span>
                            </label>
                            <div class="field-with-mic">
                                <input type="text" id="domicilioDenunciante" placeholder="Ej: Calle Falsa 123"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                                <button type="button" class="mic-button" onclick="startVoiceRecognition('domicilioDenunciante')" title="Dictar con micrófono">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                        <line x1="12" x2="12" y1="19" y2="22"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Número de Expediente
                            </label>
                            <input type="text" id="numeroExpediente" placeholder="Ej: 123/2025"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Número de Providencia
                            </label>
                            <input type="text" id="numeroProvidencia" placeholder="Ej: 45"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Fecha de Providencia
                            </label>
                            <input type="date" id="fechaProvidencia" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                        </div>
                    </div>
                </div>

                <!-- Medidas Cautelares -->
                <div class="border-l-2 border-green-300 pl-6">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-4">Medidas Cautelares</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Radio de Prohibición (metros)
                            </label>
                            <select id="distanciaProhibicion" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                                <option value="200">200 metros</option>
                                <option value="300">300 metros</option>
                                <option value="500" selected>500 metros</option>
                                <option value="1000">1000 metros</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Vigencia de la Medida (días)
                            </label>
                            <input type="number" id="vigenciaDias" value="120" min="1" max="365"
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                        </div>
                    </div>
                </div>

                <!-- Hijos -->
                <div class="border-l-2 border-purple-300 pl-6">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-4">Menores Involucrados</h2>
                    <div class="space-y-4">
                        <div class="flex items-center">
                            <input type="checkbox" id="tieneHijos" 
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="tieneHijos" class="ml-2 text-sm font-medium text-gray-700">
                                Hay hijos/menores involucrados
                            </label>
                        </div>

                        <div id="seccionHijos" class="hidden space-y-4 pl-6 border-l-2 border-purple-200">
                            <div>
                                <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                    Cantidad de Hijos/Menores
                                </label>
                                <input type="number" id="numeroHijos" value="1" min="1" max="10"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                            </div>

                            <div>
                                <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                    Nombres de los Hijos/Menores
                                </label>
                                <div class="field-with-mic">
                                    <input type="text" id="nombresHijos" placeholder="Ej: Juan Pérez, María Pérez"
                                        class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                                    <button type="button" class="mic-button" onclick="startVoiceRecognition('nombresHijos')" title="Dictar con micrófono">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                            <line x1="12" x2="12" y1="19" y2="22"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Informes Periciales -->
                <div class="border-l-2 border-orange-300 pl-6">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-4">Informes Periciales</h2>
                    <div class="space-y-3">
                        <div class="flex items-center">
                            <input type="checkbox" id="informePsicologicoDenunciante" checked
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="informePsicologicoDenunciante" class="ml-2 text-sm font-medium text-gray-700">
                                Informe Psicológico de la Denunciante
                            </label>
                        </div>

                        <div class="flex items-center">
                            <input type="checkbox" id="informePsicologicoDenunciado" checked
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="informePsicologicoDenunciado" class="ml-2 text-sm font-medium text-gray-700">
                                Evaluación Psicológica del Denunciado
                            </label>
                        </div>

                        <div class="flex items-center">
                            <input type="checkbox" id="informeSocioambiental" checked
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="informeSocioambiental" class="ml-2 text-sm font-medium text-gray-700">
                                Informe Socio-Ambiental
                            </label>
                        </div>

                        <div id="seccionSocioambiental" class="pl-6 border-l-2 border-orange-200">
                            <label class="block text-xs font-medium text-gray-600 uppercase tracking-wide mb-2">
                                Domicilio del Denunciado (para informe socio-ambiental)
                            </label>
                            <div class="field-with-mic">
                                <input type="text" id="domicilioDenunciadoSocial" placeholder="Domicilio donde residirá el denunciado"
                                    class="w-full px-4 py-2.5 border border-gray-300 rounded-sm focus:outline-none focus:border-gray-500 transition-colors text-sm">
                                <button type="button" class="mic-button" onclick="startVoiceRecognition('domicilioDenunciadoSocial')" title="Dictar con micrófono">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                        <line x1="12" x2="12" y1="19" y2="22"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Intervenciones Institucionales -->
                <div class="border-l-2 border-red-300 pl-6">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-4">Intervenciones Institucionales</h2>
                    <div class="space-y-3">
                        <div class="flex items-center">
                            <input type="checkbox" id="asesoraMinores" checked
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="asesoraMinores" class="ml-2 text-sm font-medium text-gray-700">
                                Asesoría de Menores
                            </label>
                        </div>

                        <div class="flex items-center">
                            <input type="checkbox" id="dipna" checked
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="dipna" class="ml-2 text-sm font-medium text-gray-700">
                                DIPNA
                            </label>
                        </div>

                        <div class="flex items-center">
                            <input type="checkbox" id="tratamientoPsicoterapeutico" checked
                                class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                            <label for="tratamientoPsicoterapeutico" class="ml-2 text-sm font-medium text-gray-700">
                                Tratamiento Psicoterapéutico
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción Principal -->
                <div class="flex gap-3 pt-6">
                    <button onclick="copiarDocumento()" 
                        class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-medium py-3 px-6 rounded-sm transition-colors flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copiar Providencia
                    </button>
                    
                    <button onclick="limpiarFormulario()" 
                        class="flex-1 bg-slate-500 hover:bg-slate-600 text-white font-medium py-3 px-6 rounded-sm transition-colors flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Limpiar
                    </button>
                </div>

                <!-- Sección de Oficios -->
                <div class="border-t-2 border-gray-200 pt-6 mt-6">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" x2="8" y1="13" y2="13"></line>
                            <line x1="16" x2="8" y1="17" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Generar Oficios
                    </h2>
                    
                    <div class="space-y-3">
                        <button onclick="generarOficioTrabajadoresSociales()" 
                            class="w-full bg-slate-600 hover:bg-slate-700 text-white font-medium py-2.5 px-4 rounded-sm transition-colors flex items-center justify-center gap-2 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            Oficio a Trabajadores Sociales (Punto 10)
                        </button>

                        <button onclick="generarOficioPsicologia()" 
                            class="w-full bg-slate-600 hover:bg-slate-700 text-white font-medium py-2.5 px-4 rounded-sm transition-colors flex items-center justify-center gap-2 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            Oficio a Psicología Forense (Puntos 8 y 9)
                        </button>

                        <button onclick="generarOficioPolicia()" 
                            class="w-full bg-slate-600 hover:bg-slate-700 text-white font-medium py-2.5 px-4 rounded-sm transition-colors flex items-center justify-center gap-2 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            Oficio a Comisaría (Providencia Completa)
                        </button>

                        <button onclick="generarOficioDIPNA()" 
                            class="w-full bg-slate-600 hover:bg-slate-700 text-white font-medium py-2.5 px-4 rounded-sm transition-colors flex items-center justify-center gap-2 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            Oficio a DIPNA (Providencia Completa)
                        </button>

                        <button onclick="generarTodosLosOficios()" 
                            class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-sm transition-colors flex items-center justify-center gap-2 text-sm shadow-lg border-2 border-slate-700">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="12" x2="12" y1="18" y2="12"></line>
                                <line x1="9" x2="15" y1="15" y2="15"></line>
                            </svg>
                            GENERAR TODOS LOS OFICIOS
                        </button>
                    </div>
                </div>
            </div>

            <!-- Panel Previsualización -->
            <div class="bg-white rounded-sm shadow-md border border-gray-200 p-6">
                <div class="flex justify-between items-center mb-4 pb-3 border-b-2 border-gray-200">
                    <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wider">Previsualización del Documento</h2>
                    <span class="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Actualización automática</span>
                </div>
                <div id="previsualizacion" class="bg-white border border-gray-300 rounded p-6 shadow-inner min-h-[600px]"></div>
            </div>
        </div>
    </div>

    <script>
        let recognition = null;
        let isVoiceActivated = false;
        let currentField = null;

        // Variable global para almacenar los puntos de la providencia
        let puntosProvidencia = {};

        function activarDictadoVoz() {
            isVoiceActivated = !isVoiceActivated;
            const btn = document.getElementById('activateVoiceBtn');
            
            if (isVoiceActivated) {
                btn.classList.add('bg-red-600');
                btn.classList.remove('bg-blue-500');
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        function startVoiceRecognition(fieldId) {
            if (!isVoiceActivated) {
                alert('Primero debes activar el dictado por voz usando el botón principal.');
                return;
            }

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Tu navegador no soporta reconocimiento de voz. Usa Google Chrome.');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;

            currentField = document.getElementById(fieldId);
            const micButton = event.currentTarget;
            micButton.classList.add('recording');

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                currentField.value = transcript.toUpperCase();
                generarDocumento();
            };

            recognition.onerror = function(event) {
                console.error('Error de reconocimiento:', event.error);
                alert('Error en el reconocimiento de voz: ' + event.error);
            };

            recognition.onend = function() {
                micButton.classList.remove('recording');
            };

            recognition.start();
        }

        function numeroALetras(num) {
            const unidades = ['', 'uno', 'dos', 'tres', 'cuatro', 'cinco', 'seis', 'siete', 'ocho', 'nueve'];
            const decenas = ['', '', 'veinte', 'treinta', 'cuarenta', 'cincuenta', 'sesenta', 'setenta', 'ochenta', 'noventa'];
            const especiales = ['diez', 'once', 'doce', 'trece', 'catorce', 'quince', 'dieciséis', 'diecisiete', 'dieciocho', 'diecinueve'];
            const centenas = ['', 'ciento', 'doscientos', 'trescientos', 'cuatrocientos', 'quinientos', 'seiscientos', 'setecientos', 'ochocientos', 'novecientos'];

            num = parseInt(num);

            if (num === 0) return 'cero';
            if (num === 100) return 'cien';
            if (num < 10) return unidades[num];
            if (num >= 10 && num < 20) return especiales[num - 10];
            if (num >= 20 && num < 30) {
                return num === 20 ? 'veinte' : 'veinti' + unidades[num % 10];
            }
            if (num >= 30 && num < 100) {
                return decenas[Math.floor(num / 10)] + (num % 10 !== 0 ? ' y ' + unidades[num % 10] : '');
            }
            if (num >= 100 && num < 1000) {
                const resto = num % 100;
                return centenas[Math.floor(num / 100)] + (resto !== 0 ? ' ' + numeroALetras(resto) : '');
            }
            return num.toString();
        }

            const blob = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nombreArchivo;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        async function generarTodosLosOficios() {
            try {
                let generados = [];
                let noGenerados = [];

                // Oficio Trabajadores Sociales
                if (puntosProvidencia.punto10) {
                    await generarOficioTrabajadoresSociales();
                    generados.push('Trabajadores Sociales');
                } else {
                    noGenerados.push('Trabajadores Sociales (no marcado)');
                }

                // Pequeña pausa entre generaciones
                await new Promise(resolve => setTimeout(resolve, 500));

                // Oficio Psicología
                if (puntosProvidencia.punto8 || puntosProvidencia.punto9) {
                    await generarOficioPsicologia();
                    generados.push('Psicología Forense');
                } else {
                    noGenerados.push('Psicología Forense (no marcado)');
                }

                await new Promise(resolve => setTimeout(resolve, 500));

                // Oficio Policía
                await generarOficioPolicia();
                generados.push('Comisaría');

                await new Promise(resolve => setTimeout(resolve, 500));

                // Oficio DIPNA
                if (puntosProvidencia.punto12) {
                    await generarOficioDIPNA();
                    generados.push('DIPNA');
                } else {
                    noGenerados.push('DIPNA (no marcado)');
                }

                let mensaje = `Se generaron ${generados.length} oficios:\n\n`;
                mensaje += generados.map(o => `✓ ${o}`).join('\n');
                
                if (noGenerados.length > 0) {
                    mensaje += '\n\nNo se generaron:\n';
                    mensaje += noGenerados.map(o => `✗ ${o}`).join('\n');
                }

                alert(mensaje);
            } catch (error) {
                console.error('Error:', error);
                alert('Error al generar los oficios: ' + error.message);
            }
        }

        // ========== FIN FUNCIONES DE OFICIOS ==========

        function guardarDatos() {
            const datos = {
                fechaDenuncia: document.getElementById('fechaDenuncia').value,
                numeroPreventivo: document.getElementById('numeroPreventivo').value,
                nombreDenunciante: document.getElementById('nombreDenunciante').value,
                nombreDenunciado: document.getElementById('nombreDenunciado').value,
                domicilioDenunciante: document.getElementById('domicilioDenunciante').value,
                numeroExpediente: document.getElementById('numeroExpediente').value,
                numeroProvidencia: document.getElementById('numeroProvidencia').value,
                fechaProvidencia: document.getElementById('fechaProvidencia').value,
                distanciaProhibicion: document.getElementById('distanciaProhibicion').value,
                vigenciaDias: document.getElementById('vigenciaDias').value,
                tieneHijos: document.getElementById('tieneHijos').checked,
                numeroHijos: document.getElementById('numeroHijos').value,
                nombresHijos: document.getElementById('nombresHijos').value,
                informePsicologicoDenunciante: document.getElementById('informePsicologicoDenunciante').checked,
                informePsicologicoDenunciado: document.getElementById('informePsicologicoDenunciado').checked,
                informeSocioambiental: document.getElementById('informeSocioambiental').checked,
                domicilioDenunciadoSocial: document.getElementById('domicilioDenunciadoSocial').value,
                asesoraMinores: document.getElementById('asesoraMinores').checked,
                dipna: document.getElementById('dipna').checked,
                tratamientoPsicoterapeutico: document.getElementById('tratamientoPsicoterapeutico').checked
            };
            localStorage.setItem('datosProvidenciaVF', JSON.stringify(datos));
        }

        function guardarDatosManual() {
            guardarDatos();
            alert('Datos guardados correctamente');
        }

        function cargarDatos() {
            const datos = localStorage.getItem('datosProvidenciaVF');
            if (datos) {
                const parsed = JSON.parse(datos);
                document.getElementById('fechaDenuncia').value = parsed.fechaDenuncia || '';
                document.getElementById('numeroPreventivo').value = parsed.numeroPreventivo || '';
                document.getElementById('nombreDenunciante').value = parsed.nombreDenunciante || '';
                document.getElementById('nombreDenunciado').value = parsed.nombreDenunciado || '';
                document.getElementById('domicilioDenunciante').value = parsed.domicilioDenunciante || '';
                document.getElementById('numeroExpediente').value = parsed.numeroExpediente || '';
                document.getElementById('numeroProvidencia').value = parsed.numeroProvidencia || '';
                document.getElementById('fechaProvidencia').value = parsed.fechaProvidencia || '';
                document.getElementById('distanciaProhibicion').value = parsed.distanciaProhibicion || '500';
                document.getElementById('vigenciaDias').value = parsed.vigenciaDias || '120';
                document.getElementById('tieneHijos').checked = parsed.tieneHijos || false;
                document.getElementById('numeroHijos').value = parsed.numeroHijos || '1';
                document.getElementById('nombresHijos').value = parsed.nombresHijos || '';
                document.getElementById('informePsicologicoDenunciante').checked = parsed.informePsicologicoDenunciante !== false;
                document.getElementById('informePsicologicoDenunciado').checked = parsed.informePsicologicoDenunciado !== false;
                document.getElementById('informeSocioambiental').checked = parsed.informeSocioambiental !== false;
                document.getElementById('domicilioDenunciadoSocial').value = parsed.domicilioDenunciadoSocial || '';
                document.getElementById('asesoraMinores').checked = parsed.asesoraMinores !== false;
                document.getElementById('dipna').checked = parsed.dipna !== false;
                document.getElementById('tratamientoPsicoterapeutico').checked = parsed.tratamientoPsicoterapeutico !== false;
                
                if (parsed.tieneHijos) {
                    document.getElementById('seccionHijos').classList.remove('hidden');
                }
                if (parsed.informeSocioambiental) {
                    document.getElementById('seccionSocioambiental').classList.remove('hidden');
                }
            }
        }

        function limpiarFormulario() {
            if (confirm('¿Está seguro de que desea limpiar el formulario?')) {
                document.querySelectorAll('input[type="text"], input[type="date"], input[type="number"]').forEach(input => {
                    input.value = '';
                });
                document.getElementById('distanciaProhibicion').value = '500';
                document.getElementById('vigenciaDias').value = '120';
                document.getElementById('fechaDenuncia').value = new Date().toISOString().split('T')[0];
                document.getElementById('fechaProvidencia').value = new Date().toISOString().split('T')[0];
                document.getElementById('tieneHijos').checked = false;
                document.getElementById('seccionHijos').classList.add('hidden');
                generarDocumento();
            }
        }

        // Event listeners
        document.getElementById('tieneHijos').addEventListener('change', function() {
            const seccion = document.getElementById('seccionHijos');
            if (this.checked) {
                seccion.classList.remove('hidden');
            } else {
                seccion.classList.add('hidden');
            }
            generarDocumento();
        });

        document.getElementById('informeSocioambiental').addEventListener('change', function() {
            const seccion = document.getElementById('seccionSocioambiental');
            if (this.checked) {
                seccion.classList.remove('hidden');
            } else {
                seccion.classList.add('hidden');
            }
            generarDocumento();
        });

        // Inicialización
        window.onload = function() {
            cargarDatos();
            const hoy = new Date().toISOString().split('T')[0];
            if (!document.getElementById('fechaDenuncia').value) {
                document.getElementById('fechaDenuncia').value = hoy;
            }
            if (!document.getElementById('fechaProvidencia').value) {
                document.getElementById('fechaProvidencia').value = hoy;
            }

            document.querySelectorAll('input, select, textarea').forEach(element => {
                element.addEventListener('input', generarDocumento);
                element.addEventListener('change', generarDocumento);
            });

            generarDocumento();
            setInterval(guardarDatos, 30000);
        };
    </script>
